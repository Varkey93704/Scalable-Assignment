apiVersion: apps/v1
kind: Deployment
metadata:
  name: scalable-assignment
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: scalable-assignment
  template:
    metadata:
      labels:
        app: scalable-assignment
    spec:
      containers:
        - name: flask-api
          image: varkey93704/scalable-assignment:v1.1
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
